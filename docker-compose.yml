version: '3.8'

services:
  web:
    build: .
    container_name: dj_app
    ports:
      - "9009:8000"
    volumes:
      # 将本地 static/audio 映射到容器，以便生成的音频文件能持久化（可选）
      - ./static/audio:/app/static/audio
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.laozhang.ai/v1}
